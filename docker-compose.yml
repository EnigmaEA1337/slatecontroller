# Production compose - Traefik + backend + frontend
# Pour dev local sans Traefik: utiliser docker-compose.dev.yml

services:
  traefik:
    image: traefik:v3.1
    container_name: slate-traefik
    restart: unless-stopped
    command:
      - --configfile=/etc/traefik/traefik.yml
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./data/traefik/acme.json:/acme.json
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TRAEFIK_ACME_EMAIL=${TRAEFIK_ACME_EMAIL}
    networks:
      - slate-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: slate-backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data/db:/app/data/db
      - ./data/logs:/app/data/logs
      - ./backend/profiles:/app/profiles:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.slate-api.rule=Host(`${TRAEFIK_API_DOMAIN}`)"
      - "traefik.http.routers.slate-api.entrypoints=websecure"
      - "traefik.http.routers.slate-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.slate-api.loadbalancer.server.port=8000"
    networks:
      - slate-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://${TRAEFIK_API_DOMAIN}
    container_name: slate-frontend
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.slate.rule=Host(`${TRAEFIK_DOMAIN}`)"
      - "traefik.http.routers.slate.entrypoints=websecure"
      - "traefik.http.routers.slate.tls.certresolver=letsencrypt"
      - "traefik.http.services.slate.loadbalancer.server.port=80"
    networks:
      - slate-net

networks:
  slate-net:
    driver: bridge
