# Production compose — Tailscale sidecar handles HTTPS termination
# directly (Let's Encrypt cert managed by Tailscale, no ACME challenge
# to configure, no port 80 required on the public Internet, no DNS
# record to manage). Traefik is not needed for HTTPS on the tailnet.
#
# Architecture mirrors docker-compose.dev.yml :
#   - slate-tailscale : sidecar with the controller's tailnet identity
#   - backend + frontend : share the sidecar's netns
#   - ports published on the sidecar : 443 (tailnet HTTPS), 5173+8000
#     (LAN HTTP fallback for non-tailnet devices)
#
# Both backend and frontend are baked production images (no hot reload).

services:
  slate-tailscale:
    image: tailscale/tailscale:latest
    container_name: slate-tailscale
    hostname: ${TS_HOSTNAME:-slate-controller}
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:-}
      - TS_HOSTNAME=${TS_HOSTNAME:-slate-controller}
      - TS_SERVE_CONFIG=/config/serve.json
      - TS_EXTRA_ARGS=--accept-routes
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      # See docker-compose.dev.yml comment for the rationale.
      - TS_SOCKET=/var/run/tailscale/tailscaled.sock
    volumes:
      - ./data/tailscale:/var/lib/tailscale
      - ./tailscale/serve.json:/config/serve.json:ro
      - tailscale-socket:/var/run/tailscale
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "443:443"
      - "5173:5173"
      - "8000:8000"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    container_name: slate-backend
    restart: unless-stopped
    env_file: .env
    network_mode: "service:slate-tailscale"
    depends_on:
      - slate-tailscale
    volumes:
      - ./data/db:/app/data/db
      - ./data/logs:/app/data/logs
      # Persist the same /app/data/* subdirs as in docker-compose.dev.yml
      # — anything that's regenerated cheaply on cold start can stay
      # ephemeral, but the CA root must survive container recreation.
      - ./data/ca:/app/data/ca
      - ./data/cache:/app/data/cache
      - ./data/oui_cache:/app/data/oui_cache
      - ./backend/profiles:/app/profiles:ro
      - tailscale-socket:/var/run/tailscale
      - forti-artifacts:/forti-artifacts:ro
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Same-origin in prod (Tailscale Serve handles routing). No
        # cross-origin baseURL needed.
        VITE_API_URL: ""
    container_name: slate-frontend
    restart: unless-stopped
    network_mode: "service:slate-tailscale"
    depends_on:
      - slate-tailscale

  # On-demand builder for the openfortivpn binary the Slate firmware
  # can't apt-get. Same role as in docker-compose.dev.yml — opt-in via
  # `--profile forti` so it never starts as part of a normal `up`.
  forti-builder:
    build:
      context: ./builders/forti
    image: slate-forti-builder:latest
    container_name: slate-forti-builder
    volumes:
      - forti-artifacts:/out
    profiles: ["forti"]

volumes:
  tailscale-socket:
  forti-artifacts:
