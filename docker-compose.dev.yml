# Dev compose — hot reload, no Traefik.
#
# Architecture :
#   - `slate-tailscale` : sidecar that owns the controller's tailnet
#     identity. Its tailscaled runs serve.json declaratively to expose
#     `/` → frontend, `/api` → backend on :443 with a Let's Encrypt
#     cert for ${TS_HOSTNAME}.${tailnet}.ts.net.
#   - `backend` + `frontend` : share the sidecar's network namespace
#     (`network_mode: service:slate-tailscale`). They listen on
#     127.0.0.1:8000 and 0.0.0.0:5173 from INSIDE that namespace, which
#     means :
#       (a) tailscaled in the sidecar reaches them via localhost — the
#           Serve proxy works.
#       (b) ports published on the sidecar service expose those same
#           ports on the host's LAN interfaces — LAN access without
#           Tailscale enabled.
#     One container set, two access paths.

services:
  slate-tailscale:
    image: tailscale/tailscale:latest
    container_name: slate-tailscale-dev
    hostname: ${TS_HOSTNAME:-slate-controller-dev}
    environment:
      # First-boot auth. Get one from https://login.tailscale.com/admin/settings/keys
      # → "Generate auth key". Tag the key (e.g. tag:controller), reusable=no,
      # ephemeral=no so node persists across restarts. After first boot,
      # state is in the volume below — you can blank TS_AUTHKEY out then.
      - TS_AUTHKEY=${TS_AUTHKEY:-}
      - TS_HOSTNAME=${TS_HOSTNAME:-slate-controller-dev}
      # Declarative Serve config — bind-mounted from repo, no CLI needed.
      - TS_SERVE_CONFIG=/config/serve.json
      # Accept routes advertised by other tailnet peers (Slate, UniFi
      # subnet routers, etc.). Required so the controller can call back
      # to LAN-only resources when relaying through the tailnet.
      - TS_EXTRA_ARGS=--accept-routes
      # Persistent state location — first boot writes the node key
      # here, subsequent boots reuse it.
      - TS_STATE_DIR=/var/lib/tailscale
      # Userspace networking off (we have the tun device available).
      # If your host can't expose /dev/net/tun (e.g. some NAS BSD-derived
      # builds), flip this to true and add TS_OUTBOUND_HTTP_PROXY_LISTEN.
      - TS_USERSPACE=false
      # Force the actual socket (not a symlink to /tmp/) into the named
      # volume so the backend container sees a real file when it follows
      # /var/run/tailscale/tailscaled.sock. Without this, the official
      # image creates the socket at /tmp/tailscaled.sock and only
      # symlinks /var/run/tailscale/ — the symlink resolves nowhere
      # in the backend's filesystem.
      - TS_SOCKET=/var/run/tailscale/tailscaled.sock
    volumes:
      - ./data/tailscale:/var/lib/tailscale
      - ./tailscale/serve.json:/config/serve.json:ro
      # Socket lives in a named volume shared with the backend (so the
      # backend's CLI sees it at the default path /var/run/tailscale/).
      - tailscale-socket:/var/run/tailscale
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      # Tailscale Serve terminates HTTPS here (cert managed by Tailscale).
      - "443:443"
      # LAN-direct HTTP for devices not on the tailnet. Same Vite/
      # FastAPI processes, just bypassing Tailscale Serve.
      - "5173:5173"
      - "8000:8000"
    networks:
      - slate-net
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: slate-backend-dev
    env_file: .env
    # Share slate-tailscale's netns. NOT compatible with `ports:` here —
    # all port publishing must live on the sidecar service above.
    network_mode: "service:slate-tailscale"
    depends_on:
      - slate-tailscale
    volumes:
      - ./backend/app:/app/app
      - ./backend/profiles:/app/profiles
      - ./backend/tests:/app/tests
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./data/db:/app/data/db
      - ./data/logs:/app/data/logs
      # Internal CA root key + cert + issued leaves. Without this mount
      # the CA lives in the container's writable layer and disappears
      # on every `up --force-recreate` — re-issuing every cert is not
      # only painful, it changes the root pin pushed to clients.
      - ./data/ca:/app/data/ca
      # Security feeds cache (KEV / ExploitDB / CERT-FR / Metasploit
      # snapshots). Surviving across restarts avoids re-downloading
      # 25 MB+ on every boot and keeps the "last refreshed" timestamps
      # in the security pages honest.
      - ./data/cache:/app/data/cache
      # OUI vendor lookup cache (~1 MB CSV). Cheap to re-download but
      # the refresh adds 5-10 s to startup ; persisting it makes cold
      # boots noticeably snappier.
      - ./data/oui_cache:/app/data/oui_cache
      # Sidecar's tailscaled socket — used by /api/settings/controller-https
      # to read Serve status / hostname / cert info.
      - tailscale-socket:/var/run/tailscale
      # Read-only access to the forti-builder artifact volume so the
      # backend's /api/vpn/fortinet/sideload endpoint can SCP the freshly
      # built openfortivpn binary onto the Slate without docker-in-docker.
      - forti-artifacts:/forti-artifacts:ro
      # Docker socket so /api/vpn/fortinet/build can trigger the builder
      # container directly from the UI. Mounted RO would suffice for `run`
      # only ; we mount RW because the same client also needs to fetch
      # image build progress (BuildKit gRPC over the same socket).
      - /var/run/docker.sock:/var/run/docker.sock
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    container_name: slate-frontend-dev
    # Same netns as the sidecar + backend. Vite's proxy can now reach
    # the backend at localhost:8000 instead of a docker service name.
    network_mode: "service:slate-tailscale"
    depends_on:
      - slate-tailscale
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # Backend reachable on localhost since we share the sidecar's netns.
      - VITE_BACKEND_URL=http://localhost:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  # One-shot Docker builder for the static aarch64-musl openfortivpn
  # binary the Slate firmware needs (opkg doesn't ship it for this MTK
  # target). The backend can spawn this container on demand via the
  # mounted docker socket — see app/vpn/fortinet/builder.py. Profile
  # `forti` keeps it out of the default `docker compose up`.
  forti-builder:
    build:
      context: ./builders/forti
    image: slate-forti-builder:latest
    container_name: slate-forti-builder
    volumes:
      - forti-artifacts:/out
    profiles: ["forti"]

networks:
  slate-net:
    driver: bridge

volumes:
  # Holds the sidecar's tailscaled.sock so the backend can read it.
  # Named volume (not bind mount) → portable across hosts.
  tailscale-socket:
  # Static openfortivpn binary built by `forti-builder` lives here. The
  # backend mounts it read-only and SCPs to the Slate on /sideload.
  forti-artifacts:
