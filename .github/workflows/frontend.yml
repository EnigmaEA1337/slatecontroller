name: Frontend CI

on:
  push:
    branches: ["**"]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-build:
    runs-on: ubuntu-latest
    name: tsc + eslint + vite build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: TypeScript types (tsc --noEmit)
        working-directory: frontend
        # The codebase has some pre-existing TS errors (leaflet types,
        # legacy security pages). Don't block merge until they're cleaned
        # — surface them so the trend is visible.
        continue-on-error: true
        run: npx tsc --noEmit
      - name: ESLint
        working-directory: frontend
        continue-on-error: true
        run: npx eslint src --ext .ts,.tsx
      - name: Vite production build
        working-directory: frontend
        env:
          # Same-origin in prod (the Tailscale Serve frontend reverse-
          # proxies the API), so no cross-origin baseURL needed.
          VITE_API_URL: ""
        run: npm run build
      - name: Bundle size summary
        working-directory: frontend
        run: |
          du -sh dist
          find dist -name "*.js" -size +200k -exec ls -lh {} \;
