      - { name: "THERMOPTIC_CAMO", universe: ghost_in_the_shell }
      - { name: "AGENT_SECURE",    universe: matrix }
      - { name: "SECURE_DECK",     universe: neuromancer }

  enfants:
    label: "Enfants"
    description: "Filtrage strict, safe-search forcé, horaires limités."
    icon: baby
    options:
      - { name: "JOHNNY_MNEMONIC",  universe: cyberpunk_film }
      - { name: "TRON_LEGACY",      universe: tron }
      - { name: "PIXELPUNK_JR",     universe: generic_cyber }
      - { name: "CYBERKID_NET",     universe: generic_cyber }
