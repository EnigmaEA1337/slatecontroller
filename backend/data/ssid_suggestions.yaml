      - { name: "TRON_PLAYGROUND",  universe: tron }
      - { name: "SANDBOX_NET",      universe: generic_cyber }

  mission:
    label: "Mission"
    description: "Le plus sensible. Tor + multi-VPN, kill switch, lockdown."
    icon: shield
    options:
      - { name: "VOID_RUNNER",     universe: generic_cyber }
      - { name: "NETRUNNER_X",     universe: cyberpunk_2077 }
