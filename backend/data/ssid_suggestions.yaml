# Cyberpunk SSID name suggestions, organized by usage category.
# Edit freely to add/remove names — the backend reloads on startup.
#
# Categories don't have to match Profile names; they describe the *intended
# usage tier* of an SSID (daily/guest/work/kids/sensitive). The UI surfaces
# all categories so you can mix freely.

categories:
  parents:
    label: "Parents"
    description: "Réseau principal, accès complet au LAN, daily driver."
    icon: users
    options:
      - { name: "NEXUS-7",          universe: blade_runner }
      - { name: "ZION_GATEWAY",     universe: matrix }
      - { name: "HOMESTEAD_ARASAKA", universe: cyberpunk_2077 }
      - { name: "DECKER_HQ",        universe: neuromancer }
      - { name: "GHOST_SHELL",      universe: ghost_in_the_shell }
      - { name: "WETWARE_PRIME",    universe: generic_cyber }
      - { name: "NEURAL_LINK_01",   universe: generic_cyber }
      - { name: "MAINFRAME_GAP",    universe: generic_cyber }
      - { name: "ARASAKA_TOWER",    universe: cyberpunk_2077 }
      - { name: "SECTION_9_HOME",   universe: ghost_in_the_shell }
      - { name: "MAINFRAME_PRIME",  universe: generic_cyber }

  amis:
    label: "Amis"
    description: "Réseau invités, internet only, isolation du LAN."
    icon: user-plus
    options:
      - { name: "CHROME_LOUNGE",    universe: generic_cyber }
      - { name: "AFTERLIFE_VIP",    universe: cyberpunk_2077 }
      - { name: "NIGHT_CITY_GUEST", universe: cyberpunk_2077 }
      - { name: "WIRED_CAFE",       universe: serial_experiments_lain }
      - { name: "ICEBREAKER_OPEN",  universe: neuromancer }
      - { name: "OFFGRID_VISITOR",  universe: generic_cyber }
      - { name: "NEON_DISTRICT",    universe: generic_cyber }
      - { name: "GRID_OUTSIDER",    universe: generic_cyber }
      - { name: "CHIBA_CITY",       universe: neuromancer }
      - { name: "NEW_PORT_CITY",    universe: ghost_in_the_shell }
      - { name: "OPERATOR_OPEN",    universe: matrix }
      - { name: "OPEN_GRID",        universe: generic_cyber }

  pro:
    label: "Pro"
    description: "VPN corporate forcé, hardening actif."
    icon: briefcase
    options:
      - { name: "BLACK_ICE",       universe: neuromancer }
      - { name: "TYRELL_CORP",     universe: blade_runner }
      - { name: "CORPO_SECURE",    universe: cyberpunk_2077 }
      - { name: "WINTERMUTE",      universe: neuromancer }
      - { name: "DAEMON_PROC",     universe: generic_cyber }
