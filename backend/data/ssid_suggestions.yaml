      - { name: "RED_PILL_OPS",    universe: matrix }

# Universe combos = a coherent set of 5 names that "go together".
# These are descriptive, not auto-applied — the UI shows them as a reference.
universe_combos:
  - id: cyberpunk_2077
    label: "Night City"
    description: "Univers Cyberpunk 2077"
    ssids:
      parents: ARASAKA_TOWER
      amis: AFTERLIFE_VIP
      pro: BLACK_ICE
      enfants: KIROSHI_OPTICS
      mission: NETRUNNER_X

  - id: neuromancer
    label: "Sprawl"
    description: "Hommage à la trilogie de William Gibson"
    ssids:
      parents: DECKER_HQ
      amis: CHIBA_CITY
      pro: WINTERMUTE
      enfants: SANDBOX_NET
      mission: BLACK_ICE

  - id: matrix
    label: "The Matrix"
    description: "Univers Matrix"
    ssids:
      parents: ZION_GATEWAY
      amis: OPERATOR_OPEN
      pro: AGENT_SECURE
      enfants: BLUE_PILL_JR
      mission: RED_PILL_OPS

  - id: ghost_in_the_shell
    label: "Section 9"
    description: "Univers Ghost in the Shell"
    ssids:
      parents: SECTION_9_HOME
      amis: NEW_PORT_CITY
      pro: THERMOPTIC_CAMO
      enfants: TACHIKOMA_NET
      mission: LAUGHING_MAN

  - id: generic_cyber
    label: "Sobre & Stylé"
    description: "Mix générique discret"
    ssids:
      parents: NEXUS-7
      amis: CHROME_LOUNGE
      pro: BLACK_ICE
      enfants: TRON_PLAYGROUND
      mission: VOID_RUNNER

  - id: functional
    label: "Functional Cyber"
    description: "Noms fonctionnels avec touche cyber"
    ssids:
      parents: MAINFRAME_PRIME
      amis: OPEN_GRID
      pro: SECURE_DECK
      enfants: SANDBOX_NET
      mission: VOID_RUNNER
